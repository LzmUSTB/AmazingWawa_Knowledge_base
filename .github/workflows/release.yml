name: Kinjito release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run check
      - run: npm run build -w apps/desktop
      - run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml
      - run: npm run pack:check -w @kinjito/protocol

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest, ubuntu-22.04]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional signing/notarization secrets are intentionally unset for
          # local/test builds. Configure TAURI_SIGNING_PRIVATE_KEY,
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD, APPLE_CERTIFICATE,
          # APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
          # APPLE_ID, APPLE_PASSWORD, and APPLE_TEAM_ID when required.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Kinjito ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false
