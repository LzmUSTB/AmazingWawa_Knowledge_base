version: 1
nodeId: linear-algebra-basis-dimension
title: 基底と次元：座標表示への橋渡し演習
locale: ja-JP
summary: |
  部分空間の基底、座標表示、列空間の基底を計算し、線形写像と階数に接続する。
scope:
  coverageNodeIds:
    - linear-algebra-linear-independence
    - linear-algebra-vector-space
    - linear-algebra-basis-dimension
  prerequisiteNodeIds:
    - linear-algebra-linear-independence
  relatedNodeIds:
    - linear-algebra-linear-map
    - linear-algebra-rank
problems:
  - id: la-bd-s-001
    type: calculation
    difficulty: introductory
    title: 平面部分空間の基底
    prompt: |
      \[
      W=\{(x,y,z)\in\mathbb{R}^3\mid x+y+z=0\}
      \]
      の基底と次元を求めよ。
    hints: []
    answer: |
      \[
      W=\operatorname{span}\{(-1,1,0),(-1,0,1)\},\quad \dim W=2
      \]
      である。
    solution: |
      条件式から \(x=-y-z\)。\(y=s,z=t\) とおくと
      \[
      (x,y,z)=s(-1,1,0)+t(-1,0,1)
      \]
      となる。この二本は一次独立なので基底であり、次元は \(2\)。
  - id: la-bd-s-002
    type: calculation
    difficulty: undergraduate
    title: 基底に関する座標
    prompt: |
      \[
      b_1=(1,0,1),\quad b_2=(0,1,1),\quad b_3=(1,1,0)
      \]
      を基底とする。\(x=(3,4,5)\) のこの基底に関する座標を求めよ。
    hints: []
    answer: |
      \[
      [x]_B=\begin{bmatrix}2\\3\\1\end{bmatrix}
      \]
      である。
    solution: |
      \(x=c_1b_1+c_2b_2+c_3b_3\) とおくと
      \[
      c_1+c_3=3,\quad c_2+c_3=4,\quad c_1+c_2=5
      \]
      である。解くと \(c_1=2,c_2=3,c_3=1\)。
  - id: la-bd-s-003
    type: calculation
    difficulty: undergraduate
    title: 列空間の基底
    prompt: |
      \[
      A=\begin{bmatrix}
      1&2&1&3\\
      0&1&1&2\\
      1&3&2&5
      \end{bmatrix}
      \]
      の列空間の基底を、元の列から選べ。
    hints: []
    answer: |
      第1列と第2列を選べばよい。列空間の次元は \(2\) である。
    solution: |
      列を \(a_1,\ldots,a_4\) とすると
      \[
      a_3=a_2-a_1,\quad a_4=a_1+a_2
      \]
      である。\(a_1=(1,0,1)^T\) と \(a_2=(2,1,3)^T\) は一次独立なので、列空間の基底になる。
  - id: la-bd-s-004
    type: calculation
    difficulty: undergraduate
    title: 解空間の基底
    prompt: |
      同次連立方程式
      \[
      \begin{cases}
      x_1+x_2+x_3+x_4=0,\\
      2x_1+x_2+3x_3+2x_4=0
      \end{cases}
      \]
      の解空間の基底と次元を求めよ。
    hints: []
    answer: |
      \[
      \operatorname{span}\{(-2,1,1,0),(-1,0,0,1)\}
      \]
      で、次元は \(2\) である。
    solution: >
      第2式から第1式の2倍を引くと \(-x_2+x_3=0\)、つまり \(x_2=x_3\)。また第1式から
      \(x_1=-2x_3-x_4\)。\(x_3=s,x_4=t\) とおけば

      \[

      (x_1,x_2,x_3,x_4)=s(-2,1,1,0)+t(-1,0,0,1)

      \]

      となる。
  - id: la-bd-s-005
    type: diagnostic
    difficulty: undergraduate-advanced
    title: パラメータ付き次元分類
    prompt: |
      \[
      W_t=\operatorname{span}\{(1,0,1),(0,1,t),(1,1,1+t)\}
      \]
      の次元を \(t\) によって分類せよ。
    hints: []
    answer: |
      すべての \(t\) について \(\dim W_t=2\) である。
    solution: |
      第三のベクトルは常に
      \[
      (1,1,1+t)=(1,0,1)+(0,1,t)
      \]
      である。最初の二本はどの \(t\) でも定数倍にならないので一次独立。したがって次元は常に \(2\)。
  - id: la-bd-s-006
    type: application
    difficulty: undergraduate-advanced
    title: 基底判定から可逆性へ
    prompt: |
      \(n\) 本のベクトルが \(\mathbb{R}^n\) の基底であることと、それらを列に並べた行列が可逆であることの関係を説明せよ。
    hints: []
    answer: |
      列ベクトルが \(\mathbb{R}^n\) の基底であることと、その列行列が可逆であることは同値である。
    solution: >
      列ベクトルが基底なら任意の \(b\in\mathbb{R}^n\) は一意に \(Ax=b\) と表せる。これは線形写像 \(x\mapsto
      Ax\) が全単射であることを意味するため、逆行列が存在する。逆に可逆なら列は一次独立かつ全体を張るので基底である。
