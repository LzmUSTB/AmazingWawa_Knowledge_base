vault:
  schemaVersion: 1
  title: AmazingWawa Knowledge Base
  description: Local-first knowledge graph vault for technical learning, project
    knowledge, and review.
  language: zh-CN
  defaultDomain: optics
generatedAt: 2026-06-12T14:41:50.439Z
constraints:
  idPattern: ^[a-z0-9]+(?:-[a-z0-9]+)*$
  allowedDomains:
    - optics
    - computer-graphics
  canAddDomains: true
  allowedNodeTypes:
    - topic
    - concept
    - skill
    - project
    - tool
    - paper
    - question
    - note
  allowedStatuses:
    - seed
    - growing
    - evergreen
    - deprecated
    - archive
  allowedRelations:
    - contains
    - depends-on
    - used-in
    - compares-with
  allowedLinkRelations:
    - depends-on
    - used-in
    - compares-with
  contentFormats:
    - markdown
    - html
    - none
  patchShape:
    addNodePreferred: nested-node-object
    addNode:
      operationTypeField: type
      operationTypeValue: add_node
      nodeObjectField: node
      nodeKnowledgeTypeField: node.type
      flatCompatibilityKnowledgeTypeField: nodeType
      forbidDuplicateTypeKeys: true
      forbidTopLevelTypeAsKnowledgeType: true
    addDomainPreferred: nested-domain-object
    addEdge: flat-top-level-from-to-relation
  localeTitle:
    titleRequired: true
    titleLanguage: English or canonical technical English
    titleLocaleRecommended: true
    titleLocaleRequired: false
    summaryLocaleRecommended: true
    fallbackDisplay: titleLocale || title || id
  packageFormat: wawapkg
  packageKind: import
  mimetype: application/x-wawa-kb-ai-import-package
  recommendedPackageIdPrefix: wawa-import-
  assetPolicy:
    generatedImagesAllowed: false
    mustUseOriginalSourceAssets: true
    allowedLocalMediaRoots:
      - assets/original/
      - assets/source/
      - assets/source-assets/
      - assets/source-snapshot/
    forbidBareLocalMediaPaths: true
    forbidUnreferencedPackagedAssets: true
    html: source-snapshot-assets-first when assets/source-snapshot exists; otherwise
      source-url-first
    markdown: local packaged original/source assets only; no AI-generated images
    sourceBlocksRequired: conditional-when-source-material-is-used
    sourceSnapshotFirst: true
    preferSnapshotAssetsOverExternalUrls: true
    doNotUseSnapshotIframeAsPrimaryRepresentation: true
    snapshotAssetRoots:
      - assets/source-snapshot/<source-id>/
      - assets/source-snapshot/<source-id>/_resources/
      - assets/original/
      - assets/source-assets/
    preserveCanvasCompositing: true
    noGlobalCanvasPrototypeBackgroundPatch: true
    scanGlobalCompositeOperationBeforeCanvasFix: true
  sourceSnapshot:
    useAsAssetLibrary: true
    inspectManifest: assets/source-snapshot/<source-id>/snapshot-manifest.json
    inspectOriginalHtml: assets/source-snapshot/<source-id>/index.html
    directNoteImplementationRequiredWhenFeasible: true
    iframeOnlyStrategyAllowed: false
    iframeFallbackAllowedWithReason: true
    requireSnapshotAssetsUsedList: true
    preferredStrategy: source-snapshot-assets + source-ported-interaction
    preserveCanvasAlphaCompositing: true
    canvasBackgroundFixOrder:
      - source DOM/context restoration
      - container/CSS background
      - per-demo audited bitmap fill only when safe
  htmlRichNote:
    recommendedForTutorialSources: true
    fragmentOrFullDocument: html note may contain rich HTML; renderer should isolate
      it when JavaScript is used
    allowJavaScript: true
    allowInteractiveDemos: true
    allowIframeSourceEmbeds: true
    preferDirectSnapshotBackedInteractionsOverIframe: true
    requireAppStyleCompatibility: true
    respondsToFontScale: true
    useAppCssVariables: true
    prohibitAiGeneratedImages: true
    sourceBlockClass: source-block
    sourceBlockPolicy: "conditional: required only when source/network material is
      actually cited, embedded, closely paraphrased, or used as evidence"
    reviewFilesRequiredForVisualSources:
      - review/source-coverage-plan.md
      - review/source-asset-manifest.md
      - review/interactive-demo-coverage.md
    reviewFilesAdditionalRequiredForSnapshotSources:
      - review/source-runtime-porting-notes.md
      - review/visual-contrast-audit.md
      - review/learner-facing-language-audit.md
      - review/content-sufficiency-audit.md
  localePolicy:
    priority:
      - manifest.language
      - vault.language
      - source.language
      - zh-CN
    explanatoryContentMustUseTargetLocale: true
    keepPreciseEnglishTechnicalTerms: true
    directTeachingVoice: true
  emptyNode:
    contentFormat: none
    omitNoteFiles: true
    visibleInGraph: true
counts:
  domains: 2
  nodes: 174
  edges: 174
  customBlockTypes: 0
