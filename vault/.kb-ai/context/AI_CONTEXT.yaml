vault:
  schemaVersion: 1
  title: AmazingWawa Knowledge Base
  description: Local-first knowledge graph vault for technical learning, project
    knowledge, and review.
  language: zh-CN
  defaultDomain: ""
generatedAt: 2026-06-11T12:57:09.849Z
constraints:
  idPattern: ^[a-z0-9]+(?:-[a-z0-9]+)*$
  allowedDomains: []
  canAddDomains: true
  allowedNodeTypes:
    - topic
    - concept
    - skill
    - project
    - tool
    - paper
    - question
    - note
  allowedStatuses:
    - seed
    - growing
    - evergreen
    - deprecated
    - archive
  allowedRelations:
    - contains
    - depends-on
    - used-in
    - compares-with
  allowedLinkRelations:
    - depends-on
    - used-in
    - compares-with
  contentFormats:
    - markdown
    - html
    - none
  packageFormat: wawapkg
  packageKind: import
  recommendedPackageIdPrefix: wawa-import-
  assetPolicy:
    markdown: local packaged assets only
    html: local packaged assets preferred; stable https source assets allowed
  htmlRichNote:
    fragmentOnly: true
    allowedRootClass: rich-note-article
    mustUseAppClasses: true
    respondsToFontScale: true
    disallowInlineStyle: true
    disallowScript: true
  emptyNode:
    contentFormat: none
    omitNoteFiles: true
    visibleInGraph: true
counts:
  domains: 0
  nodes: 0
  edges: 0
  customBlockTypes: 0
