exportMode: stepwise-authoring
defaultAction: ask-task-type
packageGeneration: explicit-only
supportedTasks:
  - node-architecture
  - single-node-note
  - single-node-exercises
  - source-analysis-plan
  - package-build
  - package-fix
vault:
  schemaVersion: 1
  title: AmazingWawa Knowledge Base
  description: Local-first knowledge graph vault for technical learning, project
    knowledge, and review.
  language: zh-CN
  defaultDomain: optics
generatedAt: 2026-06-22T09:33:07.154Z
contentCapabilities:
  notes:
    markdown: true
    html: true
  exercises:
    exerciseSetPerNode: true
    path: content/<domain>/<nodeId>/exercises.yaml
  stages:
    layoutOnly: true
    notContentOwner: true
constraints:
  idPattern: ^[a-z0-9]+(?:-[a-z0-9]+)*$
  allowedDomains:
    - optics
    - computer-graphics
    - mathematical-foundations
  canAddDomains: true
  allowedNodeTypes:
    - topic
    - concept
    - skill
    - project
    - tool
    - paper
    - question
    - note
  allowedStatuses:
    - seed
    - growing
    - evergreen
    - deprecated
    - archive
  allowedRelations:
    - contains
    - depends-on
    - used-in
    - compares-with
  allowedLinkRelations:
    - depends-on
    - used-in
    - compares-with
  contentFormats:
    - markdown
    - html
    - none
  patchShape:
    topLevel: object-with-operations-array
    addNode: nested-node-object
    addDomain: nested-domain-object
    addEdge: flat-top-level-from-to-relation
  localeTitle:
    titleRequired: true
    titleLocaleRecommended: true
    titleLocaleRequired: false
    summaryLocaleRecommended: true
    fallbackDisplay: titleLocale || title || id
  package:
    format: wawapkg
    kind: import
    mimetype: application/x-wawa-kb-ai-import-package
    generationPolicy: explicit-only
  assets:
    generatedImagesAllowed: false
    allowedLocalMediaRoots:
      - assets/original/
      - assets/source/
      - assets/source-assets/
      - assets/source-snapshot/
    forbidBareLocalMediaPaths: true
    forbidUnreferencedPackagedAssets: true
    sourceBlocksRequired: conditional-when-source-material-is-used
  emptyNode:
    contentFormat: none
    omitNoteFiles: true
    visibleInGraph: true
  exerciseSet:
    owner: node
    maximumPerNode: 1
    stageBindingAllowed: false
counts:
  domains: 3
  nodes: 199
  edges: 231
  markdownNotes: 0
  htmlNotes: 16
  exerciseSets: 0
  customBlockTypes: 0
